spring.application.name=studypulse
server.port=${STUDYPULSE_SERVER_PORT:8080}

spring.config.import=optional:file:./application-local.properties

spring.datasource.url=${STUDYPULSE_DB_URL:jdbc:mysql://localhost:3306/studypulse}
spring.datasource.username=${STUDYPULSE_DB_USERNAME:root}
spring.datasource.password=${STUDYPULSE_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${STUDYPULSE_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

studypulse.jwt.secret=${STUDYPULSE_JWT_SECRET:studypulse-dev-secret-key-change-me-in-production-123456}
studypulse.jwt.expiration-ms=${STUDYPULSE_JWT_EXPIRATION_MS:86400000}
